name: E2E Docker Tests

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'docker-compose.yml'
      - 'packages/sdk/**'
      - 'plugins/babysitter/**'
      - 'plugins/pi/**'
      - 'e2e-tests/**'
      - '.github/workflows/e2e-docker.yml'
  push:
    branches:
      - staging
      - develop
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'docker-compose.yml'
      - 'packages/sdk/**'
      - 'plugins/babysitter/**'
      - 'plugins/pi/**'
      - 'e2e-tests/**'
      - '.github/workflows/e2e-docker.yml'
  workflow_dispatch:

concurrency:
  group: e2e-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-e2e-tests:
    name: Docker E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare artifact directories
        run: |
          set -euo pipefail
          mkdir -p e2e-artifacts

      - name: Run structural, SDK & stop-hook tests (no API key)
        run: |
          set -euo pipefail
          npx vitest run --config e2e-tests/docker/vitest.config.ts \
            --reporter=default --reporter=json \
            --outputFile.json=e2e-artifacts/test-results-structural.json \
            e2e-tests/docker/structural.test.ts \
            e2e-tests/docker/sdk-cli.test.ts \
            e2e-tests/docker/stop-hook.test.ts \
            e2e-tests/docker/pi-harness.test.ts \
            e2e-tests/docker/pi-workflow.test.ts \
            2>&1 | tee e2e-artifacts/structural-tests.log

      # NOTE: orchestration.test.ts (Anthropic Foundry) is disabled —
      # Foundry model is no longer provisioned.  Re-enable when restored.

      - name: Run Pi workflow tests with Azure OpenAI (gated on secret)
        if: env.AZURE_OPENAI_API_KEY != ''
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_PROJECT_NAME: ${{ secrets.AZURE_OPENAI_PROJECT_NAME }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          set -euo pipefail
          npx vitest run --config e2e-tests/docker/vitest.config.ts \
            --reporter=default --reporter=json \
            --outputFile.json=e2e-artifacts/test-results-pi-azure.json \
            e2e-tests/docker/pi-workflow.test.ts \
            2>&1 | tee e2e-artifacts/pi-azure-tests.log

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-artifacts
          path: e2e-artifacts/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
