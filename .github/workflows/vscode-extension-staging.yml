name: VSCode Extension Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'packages/vscode-extension/**'

permissions:
  contents: write
  id-token: write

concurrency:
  group: vscode-extension-staging
  cancel-in-progress: false

jobs:
  validate:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Prepare artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/logs

      - name: Type check
        run: |
          set -euo pipefail
          cd packages/vscode-extension && npx tsc --noEmit 2>&1 | tee ../../artifacts/logs/typecheck.log

      - name: Lint
        run: |
          set -euo pipefail
          npm run lint --workspace=babysitter-observer 2>&1 | tee artifacts/logs/lint.log

      - name: Build
        run: |
          set -euo pipefail
          npm run build --workspace=babysitter-observer 2>&1 | tee artifacts/logs/build.log

      - name: Unit tests with coverage
        run: |
          set -euo pipefail
          npm run test:coverage --workspace=babysitter-observer 2>&1 | tee artifacts/logs/unit-tests.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: artifacts/logs
          if-no-files-found: warn

  staging-release:
    if: ${{ !contains(github.event.head_commit.message, '[skip staging]') }}
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          # Workaround: npm ci on Windows-generated lockfile may miss linux optional deps
          npm install --no-save @rollup/rollup-linux-x64-gnu 2>/dev/null || true

      - name: Download build logs
        uses: actions/download-artifact@v4
        with:
          name: build-logs
          path: artifacts/logs

      - name: Prepare release artifacts directory
        run: |
          set -euo pipefail
          mkdir -p artifacts/release

      - name: Compute prerelease version
        id: version
        run: |
          set -euo pipefail
          BASE=$(node -e "console.log(require('./packages/vscode-extension/package.json').version)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          NEXT_PATCH=$((PATCH + 1))
          SHORT_SHA=$(git rev-parse --short HEAD)
          STAGING_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-beta.${SHORT_SHA}"
          echo "staging_version=$STAGING_VERSION" >> "$GITHUB_OUTPUT"
          echo "Setting staging version: $STAGING_VERSION"

      - name: Update package.json version
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const path = 'packages/vscode-extension/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = '${{ steps.version.outputs.staging_version }}';
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build extension
        run: |
          set -euo pipefail
          npm run build --workspace=babysitter-observer

      - name: Package VSIX (pre-release)
        run: |
          set -euo pipefail
          cd packages/vscode-extension
          npx @vscode/vsce package --pre-release --no-dependencies --out ../../artifacts/release/
          ls -lh ../../artifacts/release/*.vsix

      - name: Publish to VSCode Marketplace (pre-release)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          cd packages/vscode-extension
          npx @vscode/vsce publish --pre-release --no-dependencies -p $VSCE_PAT

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-vsix-staging
          path: artifacts/release/*.vsix
          if-no-files-found: error

      - name: Create GitHub pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="vscode-v${{ steps.version.outputs.staging_version }}"
          VSIX_FILE=$(ls artifacts/release/*.vsix | head -n1)
          if [[ -z "$VSIX_FILE" ]]; then
            echo "No VSIX file found" >&2
            exit 1
          fi
          # Delete existing tag/release if it exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" -y
          fi
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -d "$TAG" || true
            git push origin ":refs/tags/$TAG" || true
          fi
          # Create new pre-release
          gh release create "$TAG" "$VSIX_FILE" \
            --title "VSCode Extension $TAG (Pre-release)" \
            --notes "VSCode Extension staging release ${{ steps.version.outputs.staging_version }}" \
            --prerelease
